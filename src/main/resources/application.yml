spring:
  application:
    name: univ-sitdown
  profiles:
    active: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

jwt:
  secret: ${JWT_SECRET:univ-sitdown-local-development-secret-key-min-32-chars-long}
  access-token-expiry-seconds: 1800
